<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Plants Diary</title>
    <link rel="stylesheet" href="assets/css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/index.js" defer></script>
</head>
<body>

    <div class="page">
  <div class="app-shell">
    <div class="window-bar">
  <div class="window-controls">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
  </div>

  <div class="window-title">
    Magic Plants Diary
  </div>
</div>

    <main class="app-content">
      <section class="dashboard-card recent-card">
    <div class="card-title">
      <span>🕘</span>
      <h2>Attività recente</h2>
    </div>

    <div class="activity-list" id="globalActivity"></div>

  </section>

 <div class="dashboard-grid">
  <section class="dashboard-card small-card shopping-card">
    <div class="card-title">
      <span>🛒</span>
      <h2>Lista spesa</h2>
    </div>

    <ul class="shopping-list" id="shoppingList">
      <!-- popolato da JS -->
    </ul>

    <div class="shopping-add">
      <input type="text" id="shoppingInput" placeholder="Aggiungi elemento..." />
      <button id="addShoppingBtn">+</button>
    </div>

  </section>

  <section class="dashboard-card small-card inventory-card">
    <div class="card-title">
      <span>🫙</span>
      <h2>Ingredienti</h2>
    </div>

    <div id="ingredientsList">
      <!-- popolato da JS -->
    </div>
  </section>
 </div>

  <section class="dashboard-card next-card">
    <div class="card-title">
      <span>🌱</span>
      <h2>Prossimi passi</h2>
    </div>

    <div class="next-row">
      <span class="next-icon">🪴</span>
      <div>
        <strong>2 piante da travasare</strong>
        <p>Spathiphyllum, Ficus Lyrata</p>
      </div>
      <span class="activity-arrow">›</span>
    </div>

    <div class="next-row">
      <span class="next-icon">🔍</span>
      <div>
        <strong>3 piante da controllare</strong>
        <p>Avocado Big, Monstera, Calathea</p>
      </div>
      <span class="activity-arrow">›</span>
    </div>
  </section>

</main>

<nav class="app-nav">
  <a href="plants-list.html" class="nav-item">
    <span class="nav-icon">🌿</span>
    <span>Piante</span>
  </a>

  <a href="index.html" class="nav-item active">
    <span class="nav-icon">🏡</span>
    <span>Home</span>
  </a>

  </a> -->

  <a href="roadmap.html" class="nav-item">
  <span class="nav-icon">🧠</span>
  <span>Roadmap</span>
</a>
</nav>

</div>

</body>
</html>
